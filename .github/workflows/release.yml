name: release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag to build (e.g. v4.0.0)'
        required: true

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            asset: dpt
            platform_pkg: linux-x64
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
            asset: dpt
            platform_pkg: linux-arm64
            cross: true
          - target: x86_64-apple-darwin
            runner: macos-latest
            asset: dpt
            platform_pkg: darwin-x64
          - target: aarch64-apple-darwin
            runner: macos-latest
            asset: dpt
            platform_pkg: darwin-arm64
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            asset: dpt.exe
            platform_pkg: win32-x64
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust -> target

      - name: Install cross
        if: matrix.cross
        run: cargo install cross --locked

      - name: Build (cross)
        if: matrix.cross
        working-directory: rust
        run: cross build --release --target ${{ matrix.target }} -p dpt-cli

      - name: Build (cargo)
        if: ${{ !matrix.cross }}
        working-directory: rust
        run: cargo build --release --target ${{ matrix.target }} -p dpt-cli

      - name: Stage binary
        shell: bash
        run: |
          mkdir -p staging
          cp rust/target/${{ matrix.target }}/release/${{ matrix.asset }} staging/
          cd staging
          if [[ "${{ matrix.asset }}" == *.exe ]]; then
            7z a "../dpt-${{ matrix.platform_pkg }}.zip" "${{ matrix.asset }}"
          else
            tar czf "../dpt-${{ matrix.platform_pkg }}.tar.gz" "${{ matrix.asset }}"
          fi

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: dpt-${{ matrix.platform_pkg }}
          path: |
            dpt-${{ matrix.platform_pkg }}.tar.gz
            dpt-${{ matrix.platform_pkg }}.zip

  release:
    name: github release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v8
        with:
          path: dist
      - name: Flatten artifacts
        run: |
          mkdir -p release
          find dist -type f \( -name "*.tar.gz" -o -name "*.zip" \) -exec cp {} release/ \;
          ls -la release
      - name: Generate checksums
        run: |
          cd release
          sha256sum * > SHA256SUMS
          cat SHA256SUMS
      - name: Resolve version
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          files: release/*
          draft: false
          generate_release_notes: true

  publish-main:
    name: publish droidpartment
    needs: release
    runs-on: ubuntu-latest
    # OIDC trusted publishing requires id-token: write so GitHub can mint the
    # short-lived ID token that npm verifies against the package's Trusted
    # Publisher record. No NPM_TOKEN secret is used.
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'
      # npm trusted publishing requires CLI 11.5.1+. The Node 20 image ships
      # with an older npm; install the latest before publishing.
      - name: Upgrade npm
        run: npm install -g npm@latest
      - name: Sync version into package.json
        shell: bash
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
            VERSION="${VERSION#v}"
          fi
          node -e "
          const fs = require('fs');
          const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          pkg.version = '${VERSION}';
          fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2));
          "
          cat package.json
      # --provenance signs an attestation that the package was built from this
      # exact commit on this exact workflow, surfaced on the npm package page.
      - name: Publish to npm via OIDC trusted publishing
        run: npm publish --provenance --access public
